[general]
import = ["theme.toml"]

[env]
TERM = "xterm-256color"

[font]
size = 20.0

[font.bold]
# family = "MesloLGS Nerd Font Mono"
family = "0xProto Nerd Font"
style = "Bold"

[font.bold_italic]
family = "0xProto Nerd Font"
# family = "MesloLGS Nerd Font Mono"
style = "Bold Italic"

[font.italic]
family = "0xProto Nerd Font"
# family = "MesloLGS Nerd Font Mono"
style = "Italic"

[font.normal]
# family = "MesloLGS Nerd Font Mono"
family = "0xProto Nerd Font"
style = "Regular"
